name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            gradle-command: ./gradlew
          - os: windows-2025
            gradle-command: .\gradlew.bat
          - os: macos-26
            gradle-command: ./gradlew

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Run tests
        run: ${{ matrix.gradle-command }} test --no-daemon

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            gradle-command: ./gradlew
          - os: windows-2025
            gradle-command: .\gradlew.bat
          - os: macos-26
            gradle-command: ./gradlew

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build
        run: ${{ matrix.gradle-command }} build --no-daemon

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write
      issues: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}kdocs/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release artifact
        run: ./gradlew build --no-daemon

      - name: Generate KDocs
        run: ./gradlew :dokkaGenerate --no-daemon

      - name: Prepare GitHub Pages site
        run: |
          rm -rf site
          mkdir -p site/kdocs
          cp -R build/dokka/html/. site/kdocs/

          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./kdocs/">
              <title>AeroGuard-MAS Documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="./kdocs/">AeroGuard-MAS KDocs</a>.</p>
            </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload KDocs Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: npm run release

      - name: Deploy KDocs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
